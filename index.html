<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylectra - Premium Outfit Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { '2xl': '1rem', '3xl': '1.5rem', '4xl': '2rem' },
                    boxShadow: { 
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.04)', 
                        'floating': '0 20px 40px rgba(0,0,0,0.1)' 
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f5f5f7; color: #1d1d1f; }
        .hidden-view { display: none !important; }
        /* Apple-style Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .glass-modal { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .scroll-smooth::-webkit-scrollbar { display: none; }
        .scroll-smooth { -ms-overflow-style: none; scrollbar-width: none; }
        /* Smooth transitions */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-indigo-200">

    <nav class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">Stylectra</h1>
        <div id="nav-actions" class="hidden flex items-center gap-4">
            <span id="user-email" class="text-xs font-semibold text-gray-500 hidden md:inline-block"></span>
            <button id="logout-btn" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition bg-indigo-50 px-4 py-2 rounded-full">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col md:flex-row overflow-hidden max-w-7xl mx-auto w-full relative">
        
        <section id="auth-view" class="w-full h-full flex items-center justify-center p-6">
            <div class="glass-card p-10 rounded-4xl shadow-floating w-full max-w-md">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold tracking-tight mb-2" id="auth-title">Sign In</h2>
                    <p class="text-sm text-gray-500">Access your styling studio</p>
                </div>
                <input type="email" id="email" placeholder="Apple ID or Email" class="w-full p-4 bg-white/80 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm border border-gray-100">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-white/80 rounded-2xl mb-6 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm border border-gray-100">
                <button id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-4 rounded-2xl shadow-md transition">Continue</button>
                <div class="mt-6 flex justify-between text-sm font-medium text-gray-500">
                    <button id="toggle-auth" onclick="toggleAuthMode()" class="hover:text-indigo-600 transition">Create Account</button>
                    <button id="forgot-password" onclick="resetPassword()" class="hover:text-indigo-600 transition">Forgot Password?</button>
                </div>
                <div id="auth-error" class="text-red-500 text-sm mt-4 text-center hidden bg-red-50 p-3 rounded-xl"></div>
            </div>
        </section>

        <section id="dashboard-view" class="w-full h-full hidden-view flex flex-col md:flex-row">
            
            <aside class="md:w-64 md:h-full flex-shrink-0 flex md:flex-col justify-around md:justify-start p-4 md:p-6 order-last md:order-first border-t md:border-r border-gray-200/50 z-30 relative glass md:bg-transparent md:border-t-0">
                <button onclick="loadSubView('wardrobe')" class="nav-btn w-full text-center md:text-left p-4 md:mb-2 rounded-2xl font-semibold text-gray-400 hover:bg-white hover:shadow-sm transition flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">👕</span> <span class="text-xs md:text-[15px]">Wardrobe</span>
                </button>
                <button onclick="loadSubView('styling')" class="nav-btn w-full text-center md:text-left p-4 md:mb-2 rounded-2xl font-semibold text-gray-400 hover:bg-white hover:shadow-sm transition flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">✨</span> <span class="text-xs md:text-[15px]">Styling</span>
                </button>
                <button onclick="loadSubView('memzone')" class="nav-btn w-full text-center md:text-left p-4 md:mb-2 rounded-2xl font-semibold text-gray-400 hover:bg-white hover:shadow-sm transition flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">📸</span> <span class="text-xs md:text-[15px]">MemZone</span>
                </button>
            </aside>

            <div class="flex-grow p-6 md:p-10 overflow-y-auto scroll-smooth" id="main-content">
                
                <div id="subview-wardrobe" class="hidden-view max-w-5xl mx-auto pb-24 md:pb-0">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-4xl font-bold tracking-tight">Wardrobe</h2>
                        <button onclick="openNewWardrobeModal()" class="bg-black text-white px-6 py-3 rounded-full font-medium shadow-md hover:scale-105 transition-transform">+ New</button>
                    </div>
                    
                    <div id="new-wardrobe-form" class="hidden glass-card p-8 rounded-4xl shadow-soft mb-8 transition-all">
                        <h3 class="font-bold text-xl mb-6">Create Collection</h3>
                        <input type="text" id="w-name" placeholder="Name (e.g., Summer Essentials)" class="w-full p-4 bg-white/80 rounded-2xl mb-4 focus:ring-2 outline-none shadow-sm">
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <select id="w-gender" class="p-4 bg-white/80 rounded-2xl outline-none shadow-sm focus:ring-2">
                                <option value="" disabled selected>Category</option><option>Women</option><option>Men</option>
                            </select>
                            <select id="w-skin" class="p-4 bg-white/80 rounded-2xl outline-none shadow-sm focus:ring-2">
                                <option value="" disabled selected>Skin Tone</option><option>Fair (Very Light)</option><option>Light</option><option>Medium</option><option>Olive</option><option>Tan</option><option>Brown</option><option>Deep (Dark)</option>
                            </select>
                            <select id="w-body" class="p-4 bg-white/80 rounded-2xl outline-none shadow-sm focus:ring-2">
                                <option value="" disabled selected>Body Shape</option><option>Hourglass</option><option>Pear (Triangle)</option><option>Apple (Round)</option><option>Rectangle (Straight)</option><option>Inverted Triangle</option>
                            </select>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="saveNewWardrobe()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold shadow-md hover:bg-indigo-700">Save Collection</button>
                            <button onclick="document.getElementById('new-wardrobe-form').classList.add('hidden')" class="bg-white text-gray-700 px-8 py-3 rounded-full font-semibold shadow-sm">Cancel</button>
                        </div>
                    </div>

                    <div id="wardrobe-list" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
                </div>

                <div id="subview-styling" class="hidden-view max-w-3xl mx-auto pb-24 md:pb-0">
                    <h2 class="text-4xl font-bold tracking-tight mb-8">Styling Studio</h2>
                    <div class="glass-card p-8 rounded-4xl shadow-soft mb-8">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Choose Collection</label>
                        <select id="style-wardrobe-select" class="w-full p-4 bg-white/80 rounded-2xl mb-6 outline-none focus:ring-2 shadow-sm"><option value="">Select Wardrobe...</option></select>
                        
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Occasion / Event</label>
                        <select id="style-occasion" class="w-full p-4 bg-white/80 rounded-2xl mb-8 outline-none focus:ring-2 shadow-sm">
                            <option>College</option><option>Office</option><option>Meeting</option><option>Family Out</option><option>Spiritual Event</option>
                            <option>Friends Out</option><option>Outing / Date</option><option>Shopping</option><option>Party</option><option>Trip / Vacation</option>
                            <option>Wedding</option><option>Reception</option><option>Functions</option><option>Gym</option><option>Sports</option>
                        </select>
                        
                        <button onclick="generateOutfit()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 text-white p-5 rounded-3xl font-bold shadow-lg transition-transform hover:scale-[1.02]">✨ Generate Match</button>
                    </div>

                    <div id="generated-outfit-area" class="hidden-view glass-card p-8 rounded-4xl shadow-floating border border-indigo-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                        <h3 class="text-2xl font-bold mb-8 text-center mt-2">Recommended Outfit</h3>
                        <div id="outfit-images-display" class="flex flex-row justify-center gap-6 md:gap-10 mb-10"></div>
                        <div class="bg-white/50 p-6 rounded-3xl backdrop-blur-md border border-white">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Capture to MemZone</label>
                            <textarea id="memzone-note" placeholder="Add a memory note..." class="w-full p-4 bg-white rounded-2xl mb-4 outline-none focus:ring-2 shadow-sm resize-none h-24 border-0"></textarea>
                            <button onclick="saveToMemZone()" class="w-full bg-black text-white px-4 py-4 rounded-2xl font-semibold shadow-md hover:bg-gray-800 transition">Save to Diary</button>
                        </div>
                    </div>
                </div>

                <div id="subview-memzone" class="hidden-view max-w-4xl mx-auto pb-24 md:pb-0">
                    <h2 class="text-4xl font-bold tracking-tight mb-8">MemZone</h2>
                    <div id="memzone-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                </div>

            </div>
        </section>

        <div id="edit-modal" class="hidden glass-modal fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-4xl shadow-floating w-full max-w-md transition-all">
                <h3 class="font-bold text-2xl mb-6">Edit Collection</h3>
                <input type="hidden" id="edit-w-id">
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Wardrobe Name</label>
                <input type="text" id="edit-w-name" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 focus:ring-2 outline-none shadow-inner border border-gray-100">
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Category (Locked)</label>
                <select id="edit-w-gender" class="w-full p-4 bg-gray-100 text-gray-400 rounded-2xl mb-4 outline-none border border-gray-100 cursor-not-allowed">
                    <option>Women</option><option>Men</option>
                </select>
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Skin Tone</label>
                <select id="edit-w-skin" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 outline-none focus:ring-2 shadow-inner border border-gray-100">
                    <option>Fair (Very Light)</option><option>Light</option><option>Medium</option><option>Olive</option><option>Tan</option><option>Brown</option><option>Deep (Dark)</option>
                </select>

                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Body Shape</label>
                <select id="edit-w-body" class="w-full p-4 bg-gray-50 rounded-2xl mb-8 outline-none focus:ring-2 shadow-inner border border-gray-100">
                    <option>Hourglass</option><option>Pear (Triangle)</option><option>Apple (Round)</option><option>Rectangle (Straight)</option><option>Inverted Triangle</option>
                </select>

                <div class="flex gap-3">
                    <button onclick="updateWardrobe()" class="flex-grow bg-indigo-600 text-white py-4 rounded-2xl font-semibold shadow-md">Update</button>
                    <button onclick="closeEditModal()" class="flex-grow bg-gray-200 text-gray-800 py-4 rounded-2xl font-semibold">Cancel</button>
                </div>
            </div>
        </div>

        <div id="memzone-modal" class="hidden glass-modal fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-4xl shadow-floating w-full max-w-md transition-all text-center">
                <span class="text-4xl mb-4 block">✨</span>
                <h3 class="font-bold text-2xl mb-2">Outfit Details</h3>
                <div id="memzone-info-content" class="text-sm text-gray-600 mb-6 space-y-2 bg-gray-50 p-4 rounded-2xl text-left border border-gray-100"></div>
                
                <label class="block text-left text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Update Memory Note</label>
                <input type="hidden" id="edit-mem-id">
                <textarea id="edit-mem-note" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 outline-none focus:ring-2 shadow-inner border border-gray-100 resize-none h-24"></textarea>
                
                <div class="flex gap-3">
                    <button onclick="updateMemZoneNote()" class="flex-grow bg-indigo-600 text-white py-3 rounded-2xl font-semibold shadow-md">Save Note</button>
                    <button onclick="document.getElementById('memzone-modal').classList.add('hidden')" class="flex-grow bg-gray-200 text-gray-800 py-3 rounded-2xl font-semibold">Close</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, addDoc, updateDoc, arrayUnion, arrayRemove, query, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ADD YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCcOr6SrXpznpXhyGB2Og4rFPqJIS7M0cA",
            authDomain: "stylectra-71660.firebaseapp.com",
            projectId: "stylectra-71660",
            storageBucket: "stylectra-71660.firebasestorage.app",
            messagingSenderId: "955558027492",
            appId: "1:955558027492:web:4c6d178b35710939184cf1",
            measurementId: "G-PYWZ5TXJ2H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let isLoginMode = true;
        let currentGeneratedImages = { topId: null, bottomId: null, wName: '', wSkin: '', wBody: '', topCat: '', botCat: '' };

        // Configuration Arrays
        const womenCategories = ['Top', 'Bottom', 'Dress', 'Kurti', 'Saree', 'Casuals', 'Ethnic Wear', 'Sports Wear', 'Footwear'];
        const menCategories = ['Shirt', 'T-Shirt', 'Pant', 'Ethnic Wear', 'Casuals', 'Sports Wear', 'Footwear'];

        // --- UI Routing ---
        window.switchView = (viewId) => {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById(`${viewId}-view`).classList.remove('hidden-view');
            if(viewId === 'dashboard') {
                document.getElementById('nav-actions').classList.remove('hidden');
                document.getElementById('user-email').innerText = currentUser.email;
                loadSubView('wardrobe');
            } else {
                document.getElementById('nav-actions').classList.add('hidden');
            }
        };

        window.loadSubView = (subId) => {
            document.getElementById('subview-wardrobe').classList.add('hidden-view');
            document.getElementById('subview-styling').classList.add('hidden-view');
            document.getElementById('subview-memzone').classList.add('hidden-view');
            document.getElementById(`subview-${subId}`).classList.remove('hidden-view');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
                btn.classList.add('text-gray-400');
            });
            event?.currentTarget?.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
            event?.currentTarget?.classList.remove('text-gray-400');

            if(subId === 'wardrobe') fetchWardrobes();
            if(subId === 'memzone') fetchMemZone();
        };

        // --- Auth ---
        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; switchView('dashboard'); } 
            else { currentUser = null; switchView('auth'); }
        });

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Sign In" : "Create Account";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Continue" : "Sign Up";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Create Account" : "Back to Sign In";
        };

        document.getElementById('auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            errorDiv.classList.add('hidden');
            const btn = document.getElementById('auth-btn');
            btn.innerText = "Authenticating...";
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorDiv.innerText = error.message.replace("Firebase: ", "");
                errorDiv.classList.remove('hidden');
                btn.innerText = isLoginMode ? "Continue" : "Sign Up";
            }
        });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- Wardrobe Core ---
        window.openNewWardrobeModal = () => document.getElementById('new-wardrobe-form').classList.toggle('hidden');

        window.saveNewWardrobe = async () => {
            const name = document.getElementById('w-name').value;
            const gender = document.getElementById('w-gender').value;
            const skinTone = document.getElementById('w-skin').value;
            const bodyShape = document.getElementById('w-body').value;
            
            if(!name || !gender || !skinTone || !bodyShape) return alert("Please fill all fields.");

            // Check for duplicate name
            const q = query(collection(db, `users/${currentUser.uid}/wardrobes`));
            const snapshot = await getDocs(q);
            const isDuplicate = snapshot.docs.some(d => d.data().name.toLowerCase() === name.toLowerCase());
            
            if (isDuplicate) return alert(`A wardrobe named "${name}" already exists.`);

            try {
                await addDoc(collection(db, `users/${currentUser.uid}/wardrobes`), { name, gender, skinTone, bodyShape, items: [] });
                document.getElementById('new-wardrobe-form').classList.add('hidden');
                document.getElementById('w-name').value = '';
                fetchWardrobes();
            } catch (e) { alert("Error saving wardrobe."); }
        };

        window.fetchWardrobes = async () => {
            const list = document.getElementById('wardrobe-list');
            const select = document.getElementById('style-wardrobe-select');
            list.innerHTML = '<p class="text-gray-500 col-span-2 text-center py-10">Syncing collection...</p>'; 
            select.innerHTML = '<option value="">Select Wardrobe...</option>';

            const q = query(collection(db, `users/${currentUser.uid}/wardrobes`));
            const snapshot = await getDocs(q);
            list.innerHTML = '';
            
            if(snapshot.empty) list.innerHTML = '<p class="text-gray-500 col-span-2 text-center py-10">No wardrobes created yet.</p>';

            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const items = data.items || [];
                const catOptions = data.gender === 'Men' ? menCategories : womenCategories;
                
                let galleryHTML = '';
                if(items.length > 0) {
                    for (const item of items) {
                        const imgData = await localforage.getItem(item.imageId);
                        if(imgData) {
                            galleryHTML += `
                                <div class="flex flex-col items-center group">
                                    <div class="relative w-20 h-24 rounded-2xl border border-gray-200 overflow-hidden shadow-sm transition-transform hover:scale-105 cursor-pointer">
                                        <img src="${imgData}" class="w-full h-full object-cover">
                                        <button onclick="deleteItem('${docSnap.id}', '${item.imageId}', '${item.category}')" class="absolute inset-0 bg-red-500/80 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm">Delete</button>
                                    </div>
                                    <span class="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-wide">${item.category}</span>
                                </div>
                            `;
                        }
                    }
                } else { galleryHTML = `<p class="text-sm text-gray-400 italic w-full py-4 text-center">Empty collection</p>`; }

                let catSelectHTML = `<option value="" disabled selected>Select Category...</option>`;
                catOptions.forEach(opt => catSelectHTML += `<option>${opt}</option>`);

                list.innerHTML += `
                    <div class="glass-card p-8 rounded-4xl shadow-soft flex flex-col justify-between relative group">
                        <div class="absolute top-6 right-6 flex gap-2">
                            <button onclick="openEditModal('${docSnap.id}', '${data.name}', '${data.gender}', '${data.skinTone}', '${data.bodyShape}')" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition" title="Edit">✏️</button>
                            <button onclick="deleteWardrobe('${docSnap.id}')" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-100 transition" title="Delete">🗑️</button>
                        </div>

                        <div>
                            <div class="flex flex-col items-start mb-6">
                                <span class="bg-indigo-50 text-indigo-700 text-xs px-3 py-1 rounded-full font-bold border border-indigo-100 mb-2">${data.gender}</span>
                                <h3 class="font-bold text-2xl tracking-tight">${data.name}</h3>
                                <p class="text-sm text-gray-500 mt-1">${data.skinTone} • ${data.bodyShape}</p>
                            </div>
                            
                            <div class="mb-6 p-4 bg-white/50 rounded-3xl border border-white">
                                <div class="flex overflow-x-auto gap-4 pb-2 scroll-smooth">${galleryHTML}</div>
                            </div>
                        </div>
                        
                        <div class="pt-6 border-t border-gray-100">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-14 h-14 bg-gray-100 rounded-2xl overflow-hidden flex items-center justify-center relative shrink-0">
                                    <span class="text-2xl text-gray-400 absolute z-0">+</span>
                                    <img id="preview-${docSnap.id}" class="w-full h-full object-cover hidden relative z-10" />
                                </div>
                                <input type="file" accept="image/*" id="file-${docSnap.id}" onchange="previewImage(this, '${docSnap.id}')" class="text-sm w-full file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-indigo-50 file:text-indigo-700">
                            </div>

                            <div class="flex gap-2">
                                <select id="cat-${docSnap.id}" class="flex-grow p-3 bg-white border border-gray-100 rounded-2xl outline-none focus:ring-2 text-sm shadow-sm">${catSelectHTML}</select>
                                <button onclick="uploadLocalItem('${docSnap.id}')" id="btn-${docSnap.id}" class="bg-black text-white px-5 rounded-2xl text-sm font-semibold shadow-md hover:scale-105 transition-transform">Save</button>
                            </div>
                        </div>
                    </div>
                `;
                select.innerHTML += `<option value="${docSnap.id}">${data.name}</option>`;
            }
        };

        // --- Editing & Deleting ---
        window.openEditModal = (id, name, gender, skin, body) => {
            document.getElementById('edit-w-id').value = id;
            document.getElementById('edit-w-name').value = name;
            document.getElementById('edit-w-gender').value = gender;
            document.getElementById('edit-w-gender').disabled = true; // Lock gender
            document.getElementById('edit-w-skin').value = skin;
            document.getElementById('edit-w-body').value = body;
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = () => document.getElementById('edit-modal').classList.add('hidden');

        window.updateWardrobe = async () => {
            const id = document.getElementById('edit-w-id').value;
            const ref = doc(db, `users/${currentUser.uid}/wardrobes`, id);
            await updateDoc(ref, {
                name: document.getElementById('edit-w-name').value,
                skinTone: document.getElementById('edit-w-skin').value,
                bodyShape: document.getElementById('edit-w-body').value
            });
            closeEditModal();
            fetchWardrobes();
        };

        window.deleteWardrobe = async (id) => {
            if(!confirm("Are you sure you want to delete this collection?")) return;
            await deleteDoc(doc(db, `users/${currentUser.uid}/wardrobes`, id));
            fetchWardrobes();
        };

        window.deleteItem = async (wardrobeId, imageId, category) => {
            if(!confirm("Remove this item from the collection?")) return;
            const ref = doc(db, `users/${currentUser.uid}/wardrobes`, wardrobeId);
            await updateDoc(ref, { items: arrayRemove({ imageId: imageId, category: category }) });
            await localforage.removeItem(imageId);
            fetchWardrobes();
        };

        // --- Uploading ---
        window.previewImage = (input, id) => {
            const preview = document.getElementById(`preview-${id}`);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); }
                reader.readAsDataURL(input.files[0]);
            } else { preview.classList.add('hidden'); preview.src = ''; }
        };

        window.uploadLocalItem = async (wardrobeId) => {
            const fileInput = document.getElementById(`file-${wardrobeId}`);
            const category = document.getElementById(`cat-${wardrobeId}`).value;
            const btn = document.getElementById(`btn-${wardrobeId}`);
            if(!fileInput.files.length) return alert("Select an image.");
            if(!category) return alert("Select a category.");

            btn.innerText = "Saving...";
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result;
                const imageId = `img_${Date.now()}`;
                
                await localforage.setItem(imageId, base64Data);
                const ref = doc(db, `users/${currentUser.uid}/wardrobes`, wardrobeId);
                await updateDoc(ref, { items: arrayUnion({ imageId: imageId, category: category }) });

                btn.innerText = "Save";
                fileInput.value = "";
                document.getElementById(`preview-${wardrobeId}`).classList.add('hidden');
                document.getElementById(`cat-${wardrobeId}`).selectedIndex = 0;
                fetchWardrobes();
            };
            reader.readAsDataURL(fileInput.files[0]);
        };

        // --- SMART GENERATION ---
        window.generateOutfit = async () => {
            const wid = document.getElementById('style-wardrobe-select').value;
            const occasion = document.getElementById('style-occasion').value;
            if(!wid) return alert("Please select a wardrobe.");
            
            const btn = event.target;
            btn.innerHTML = "✨ Matching...";

            try {
                const docSnap = await getDoc(doc(db, `users/${currentUser.uid}/wardrobes`, wid));
                const wData = docSnap.data();
                const items = wData.items || [];

                // Smart Filter Logic
                let allowedTops = ['Top', 'Shirt', 'Kurti'];
                let allowedBottoms = ['Bottom', 'Pant', 'Casuals'];
                let allowedFull = ['Dress', 'Saree', 'Ethnic Wear'];

                if (['Office', 'Meeting'].includes(occasion)) {
                    allowedTops = ['Shirt', 'Top']; allowedBottoms = ['Pant', 'Bottom']; allowedFull = ['Kurti'];
                } else if (['College'].includes(occasion)) {
                    // Strict rule: No T-Shirts for college
                    allowedTops = ['Shirt', 'Top', 'Kurti']; allowedBottoms = ['Pant', 'Bottom', 'Casuals'];
                } else if (['Gym', 'Sports'].includes(occasion)) {
                    allowedTops = ['Sports Wear', 'T-Shirt']; allowedBottoms = ['Sports Wear', 'Pant'];
                } else if (['Wedding', 'Reception', 'Spiritual Event'].includes(occasion)) {
                    allowedTops = ['Shirt', 'Kurti']; allowedBottoms = ['Pant']; allowedFull = ['Ethnic Wear', 'Saree'];
                } else {
                    allowedTops.push('T-Shirt'); // Casual occasions allow T-Shirts
                }

                // Filter items
                const validTops = items.filter(i => allowedTops.includes(i.category));
                const validBottoms = items.filter(i => allowedBottoms.includes(i.category));

                if (validTops.length === 0 || validBottoms.length === 0) {
                    btn.innerHTML = "✨ Generate Match";
                    return alert(`No suitable clothes found for "${occasion}" in this wardrobe. Please upload matching items (e.g., ${allowedTops.join(', ')} / ${allowedBottoms.join(', ')}).`);
                }

                const selTop = validTops[Math.floor(Math.random() * validTops.length)];
                const selBot = validBottoms[Math.floor(Math.random() * validBottoms.length)];

                const topImg = await localforage.getItem(selTop.imageId);
                const botImg = await localforage.getItem(selBot.imageId);

                // Save Context
                currentGeneratedImages = { 
                    topId: selTop.imageId, bottomId: selBot.imageId, 
                    topCat: selTop.category, botCat: selBot.category,
                    wName: wData.name, wSkin: wData.skinTone, wBody: wData.bodyShape 
                };

                document.getElementById('generated-outfit-area').classList.remove('hidden-view');
                document.getElementById('outfit-images-display').innerHTML = `
                    <div class="flex flex-col items-center group">
                        <span class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-wider">${selTop.category}</span>
                        <div class="h-56 w-40 md:h-72 md:w-52 bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden group-hover:shadow-lg transition"><img src="${topImg}" class="w-full h-full object-cover" /></div>
                    </div>
                    <div class="flex flex-col items-center group">
                        <span class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-wider">${selBot.category}</span>
                        <div class="h-56 w-40 md:h-72 md:w-52 bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden group-hover:shadow-lg transition"><img src="${botImg}" class="w-full h-full object-cover" /></div>
                    </div>
                `;
                btn.innerHTML = "✨ Generate Match";
            } catch (e) { alert("Generation error."); btn.innerHTML = "✨ Generate Match"; }
        };

        // --- MemZone ---
        window.saveToMemZone = async () => {
            const note = document.getElementById('memzone-note').value;
            const occasion = document.getElementById('style-occasion').value;
            if(!currentGeneratedImages.topId) return;
            const btn = event.target;
            btn.innerText = "Saving...";
            
            try {
                await addDoc(collection(db, `users/${currentUser.uid}/memzone`), { 
                    note, occasion, date: new Date().toISOString(), 
                    ...currentGeneratedImages // Spread saves IDs, Categories, and Wardrobe info
                });
                alert("Saved to MemZone Diary!");
                document.getElementById('memzone-note').value = '';
                document.getElementById('generated-outfit-area').classList.add('hidden-view');
                btn.innerText = "Save to Diary";
            } catch(e) { btn.innerText = "Save to Diary"; }
        };

        window.fetchMemZone = async () => {
            const list = document.getElementById('memzone-list');
            list.innerHTML = '<p class="text-gray-500">Loading diary...</p>';
            const snapshot = await getDocs(query(collection(db, `users/${currentUser.uid}/memzone`)));
            list.innerHTML = '';
            
            if (snapshot.empty) { list.innerHTML = '<p class="text-gray-500 text-center py-10 col-span-2 glass-card rounded-3xl">No memories saved yet.</p>'; return; }
            
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const topImg = data.topId ? await localforage.getItem(data.topId) : '';
                const bottomImg = data.bottomId ? await localforage.getItem(data.bottomId) : '';
                
                // Safe JSON stringify to pass object to modal
                const dataStr = encodeURIComponent(JSON.stringify({...data, id: docSnap.id}));

                list.innerHTML += `
                    <div class="glass-card rounded-4xl shadow-soft border border-white pt-2 px-6 pb-6 relative group overflow-hidden">
                        
                        <div class="flex justify-center mb-2">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-12 h-6 text-gray-300">
                                <path d="M12 4v4M12 4a2 2 0 1 1 2 2h-2M4 16l8-8 8 8"></path>
                                <path d="M4 16h16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2z"></path>
                            </svg>
                        </div>

                        <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="openMemZoneInfo('${dataStr}')" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center hover:bg-indigo-100" title="Info/Edit">ℹ️</button>
                            <button onclick="deleteMemZone('${docSnap.id}')" class="w-8 h-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center hover:bg-red-100" title="Delete">🗑️</button>
                        </div>

                        <div class="text-center mb-5">
                            <h4 class="font-bold text-xl">${data.occasion}</h4>
                            <span class="text-xs text-gray-400 font-medium">${new Date(data.date).toLocaleDateString()}</span>
                        </div>
                        
                        <div class="flex justify-center gap-4 mb-5">
                            <div class="flex flex-col items-center">
                                <img src="${topImg}" class="w-24 h-32 object-cover rounded-2xl shadow-sm border border-gray-100" />
                                <span class="text-[10px] text-gray-400 font-bold mt-2 uppercase">${data.topCat || 'Top'}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <img src="${bottomImg}" class="w-24 h-32 object-cover rounded-2xl shadow-sm border border-gray-100" />
                                <span class="text-[10px] text-gray-400 font-bold mt-2 uppercase">${data.botCat || 'Bottom'}</span>
                            </div>
                        </div>
                        
                        ${data.note ? `<div class="bg-white/60 p-4 rounded-2xl border border-white text-center"><p class="text-gray-700 text-sm font-medium">"${data.note}"</p></div>` : ''}
                    </div>
                `;
            }
        };

        window.openMemZoneInfo = (dataStr) => {
            const data = JSON.parse(decodeURIComponent(dataStr));
            document.getElementById('edit-mem-id').value = data.id;
            document.getElementById('edit-mem-note').value = data.note || '';
            
            document.getElementById('memzone-info-content').innerHTML = `
                <p><strong>Wardrobe Origin:</strong> ${data.wName || 'Unknown'}</p>
                <p><strong>Skin Tone Profile:</strong> ${data.wSkin || 'N/A'}</p>
                <p><strong>Body Shape Profile:</strong> ${data.wBody || 'N/A'}</p>
            `;
            document.getElementById('memzone-modal').classList.remove('hidden');
        };

        window.updateMemZoneNote = async () => {
            const id = document.getElementById('edit-mem-id').value;
            const note = document.getElementById('edit-mem-note').value;
            await updateDoc(doc(db, `users/${currentUser.uid}/memzone`, id), { note });
            document.getElementById('memzone-modal').classList.add('hidden');
            fetchMemZone();
        };

        window.deleteMemZone = async (id) => {
            if(!confirm("Delete this memory?")) return;
            await deleteDoc(doc(db, `users/${currentUser.uid}/memzone`, id));
            fetchMemZone();
        };
    </script>
</body>
</html>
