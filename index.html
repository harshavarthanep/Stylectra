<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylectra - Outfit Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        .hidden-view { display: none !important; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">Stylectra</h1>
        <div id="nav-actions" class="hidden">
            <button onclick="switchView('dashboard')" class="mx-2 hover:underline">Dashboard</button>
            <button id="logout-btn" class="mx-2 bg-indigo-800 px-3 py-1 rounded">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex overflow-hidden">
        
        <section id="auth-view" class="w-full flex items-center justify-center">
            <div class="bg-white p-8 rounded shadow-md w-96">
                <h2 class="text-xl font-bold mb-4" id="auth-title">Login</h2>
                <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
                <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
                <button id="auth-btn" class="w-full bg-indigo-600 text-white p-2 rounded">Login</button>
                <div class="mt-4 flex justify-between text-sm text-indigo-600">
                    <button id="toggle-auth" onclick="toggleAuthMode()">Create Account</button>
                    <button id="forgot-password" onclick="resetPassword()">Forgot Password?</button>
                </div>
                <div id="auth-error" class="text-red-500 text-sm mt-2 hidden"></div>
            </div>
        </section>

        <section id="dashboard-view" class="w-full hidden-view flex">
            <aside class="w-64 bg-white border-r shadow-sm flex flex-col">
                <button onclick="loadSubView('wardrobe')" class="p-4 border-b hover:bg-gray-100 text-left font-semibold">👕 Wardrobe</button>
                <button onclick="loadSubView('styling')" class="p-4 border-b hover:bg-gray-100 text-left font-semibold">✨ Styling</button>
                <button onclick="loadSubView('memzone')" class="p-4 border-b hover:bg-gray-100 text-left font-semibold">📸 MemZone</button>
            </aside>

            <div class="flex-grow p-6 overflow-y-auto" id="main-content">
                
                <div id="subview-wardrobe" class="hidden-view">
                    <h2 class="text-2xl font-bold mb-4">Your Wardrobes</h2>
                    <button onclick="openNewWardrobeModal()" class="bg-indigo-600 text-white px-4 py-2 rounded mb-4">+ Create New Wardrobe</button>
                    
                    <div id="wardrobe-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        </div>
                </div>

                <div id="subview-styling" class="hidden-view">
                    <h2 class="text-2xl font-bold mb-4">Styling Studio</h2>
                    <div class="bg-white p-6 rounded shadow-sm max-w-2xl">
                        <select id="style-wardrobe-select" class="w-full p-2 border rounded mb-3"><option>Select Wardrobe...</option></select>
                        <select id="style-occasion" class="w-full p-2 border rounded mb-3">
                            <option>College</option><option>Office</option><option>Meeting</option><option>Family Out</option>
                            <option>Outing / Date</option><option>Party</option><option>Gym</option><option>Wedding</option>
                        </select>
                        <button onclick="generateOutfit()" class="w-full bg-indigo-600 text-white p-2 rounded font-bold">Generate Outfit</button>
                    </div>

                    <div id="generated-outfit-area" class="mt-8 hidden-view bg-white p-6 rounded shadow-sm border-2 border-indigo-200">
                        <h3 class="text-xl font-bold mb-4">Recommended Outfit</h3>
                        <div id="outfit-images-display" class="flex gap-4 mb-4"></div>
                        <textarea id="memzone-note" placeholder="Add a note (e.g., 'Wore this to Sarah's party')..." class="w-full p-2 border rounded mb-3"></textarea>
                        <button onclick="saveToMemZone()" class="bg-green-600 text-white px-4 py-2 rounded">Save to MemZone</button>
                    </div>
                </div>

                <div id="subview-memzone" class="hidden-view">
                    <h2 class="text-2xl font-bold mb-4">MemZone History</h2>
                    <div id="memzone-list" class="space-y-4">
                        </div>
                </div>

            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, addDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcOr6SrXpznpXhyGB2Og4rFPqJIS7M0cA",
            authDomain: "stylectra-71660.firebaseapp.com",
            projectId: "stylectra-71660",
            storageBucket: "stylectra-71660.firebasestorage.app",
            messagingSenderId: "955558027492",
            appId: "1:955558027492:web:4c6d178b35710939184cf1",
            measurementId: "G-PYWZ5TXJ2H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let isLoginMode = true;

        // UI Routing
        window.switchView = (viewId) => {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById(`${viewId}-view`).classList.remove('hidden-view');
            
            if(viewId === 'dashboard') {
                document.getElementById('nav-actions').classList.remove('hidden');
                loadSubView('wardrobe'); // Default subview
            } else {
                document.getElementById('nav-actions').classList.add('hidden');
            }
        };

        window.loadSubView = (subId) => {
            document.getElementById('subview-wardrobe').classList.add('hidden-view');
            document.getElementById('subview-styling').classList.add('hidden-view');
            document.getElementById('subview-memzone').classList.add('hidden-view');
            document.getElementById(`subview-${subId}`).classList.remove('hidden-view');
            
            if(subId === 'wardrobe') fetchWardrobes();
            if(subId === 'memzone') fetchMemZone();
        };

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                switchView('dashboard');
            } else {
                currentUser = null;
                switchView('auth');
            }
        });

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Create Account" : "Back to Login";
        };

        document.getElementById('auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            errorDiv.classList.add('hidden');

            try {
                if(isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        window.resetPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Please enter your email first.");
            sendPasswordResetEmail(auth, email).then(() => alert("Password reset email sent!")).catch(e => alert(e.message));
        };

        // Wardrobe Logic (Firestore for text, LocalForage for images)
        window.openNewWardrobeModal = async () => {
            const name = prompt("Enter Wardrobe Name:");
            if(!name) return;
            const gender = prompt("Gender Category (Men/Women):", "Women");
            const skinTone = prompt("Skin Tone (Fair, Medium, Deep...):", "Medium");
            const bodyShape = prompt("Body Shape (Hourglass, Pear, Apple...):", "Hourglass");

            try {
                const userRef = collection(db, `users/${currentUser.uid}/wardrobes`);
                await addDoc(userRef, { name, gender, skinTone, bodyShape, items: [] });
                fetchWardrobes();
            } catch (e) { console.error("Error adding document: ", e); }
        };

        window.fetchWardrobes = async () => {
            const list = document.getElementById('wardrobe-list');
            const select = document.getElementById('style-wardrobe-select');
            list.innerHTML = ''; select.innerHTML = '<option value="">Select Wardrobe...</option>';

            const q = query(collection(db, `users/${currentUser.uid}/wardrobes`));
            const snapshot = await getDocs(q);
            
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                // Add to Wardrobe UI
                list.innerHTML += `
                    <div class="bg-white p-4 border rounded shadow-sm">
                        <h3 class="font-bold text-lg">${data.name} (${data.gender})</h3>
                        <p class="text-sm text-gray-500">Skin: ${data.skinTone} | Body: ${data.bodyShape}</p>
                        <div class="mt-4">
                            <label class="block text-sm font-semibold mb-1">Add Item (Browser Cache)</label>
                            <input type="file" accept="image/*" id="file-${docSnap.id}" class="text-sm w-full mb-2">
                            <select id="cat-${docSnap.id}" class="w-full p-1 border rounded mb-2">
                                <option>Top</option><option>Bottom</option><option>Footwear</option><option>Dress</option>
                            </select>
                            <button onclick="uploadLocalItem('${docSnap.id}')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-sm w-full">Save Image to Device</button>
                        </div>
                    </div>
                `;

                // Add to Styling Select
                select.innerHTML += `<option value="${docSnap.id}">${data.name}</option>`;
            });
        };

        // IMAGE HANDLING: Convert to Base64 and save to IndexedDB via LocalForage
        window.uploadLocalItem = async (wardrobeId) => {
            const fileInput = document.getElementById(`file-${wardrobeId}`);
            const category = document.getElementById(`cat-${wardrobeId}`).value;
            if(!fileInput.files.length) return alert("Select an image first.");

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onloadend = async () => {
                const base64Data = reader.result;
                const imageId = `img_${Date.now()}`;
                
                // Save massive base64 string locally to save Firebase costs
                await localforage.setItem(imageId, base64Data);
                
                // Save tiny reference in Firestore
                const wardrobeRef = doc(db, `users/${currentUser.uid}/wardrobes`, wardrobeId);
                // In production, fetch array, push, and update. Simplified here:
                alert(`${category} saved securely to your local device cache!`);
            };
            reader.readAsDataURL(file);
        };

        // Styling & MemZone Simulation
        window.generateOutfit = () => {
            const wid = document.getElementById('style-wardrobe-select').value;
            if(!wid) return alert("Select a wardrobe.");
            
            document.getElementById('generated-outfit-area').classList.remove('hidden-view');
            // Since actual matching algorithms require complex backend logic, 
            // for the SPA frontend, we display placeholders representing the local cache retrieval.
            document.getElementById('outfit-images-display').innerHTML = `
                <div class="h-32 w-24 bg-gray-200 border-dashed border-2 flex items-center justify-center text-sm text-gray-500">Matched Top</div>
                <div class="h-32 w-24 bg-gray-200 border-dashed border-2 flex items-center justify-center text-sm text-gray-500">Matched Bottom</div>
            `;
        };

        window.saveToMemZone = async () => {
            const note = document.getElementById('memzone-note').value;
            const occasion = document.getElementById('style-occasion').value;
            
            try {
                const memRef = collection(db, `users/${currentUser.uid}/memzone`);
                await addDoc(memRef, { note, occasion, date: new Date().toISOString() });
                alert("Saved to MemZone!");
                document.getElementById('memzone-note').value = '';
                document.getElementById('generated-outfit-area').classList.add('hidden-view');
            } catch(e) { console.error(e); }
        };

        window.fetchMemZone = async () => {
            const list = document.getElementById('memzone-list');
            list.innerHTML = '';
            const q = query(collection(db, `users/${currentUser.uid}/memzone`));
            const snapshot = await getDocs(q);
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="bg-white p-4 border rounded shadow-sm border-l-4 border-l-indigo-500">
                        <div class="text-xs text-gray-500 mb-1">${new Date(data.date).toLocaleDateString()} - ${data.occasion}</div>
                        <p class="font-medium text-gray-800">"${data.note}"</p>
                    </div>
                `;
            });
        };
    </script>
</body>
</html>
