<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylectra - Premium Outfit Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { '2xl': '1rem', '3xl': '1.5rem', '4xl': '2rem' },
                    boxShadow: { 
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.04)', 
                        'floating': '0 20px 40px rgba(0,0,0,0.08)',
                        'glass-edge': 'inset 0 1px 1px rgba(255, 255, 255, 0.8)'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            color: #1d1d1f;
            /* Premium Ambient Mesh Gradient */
            background-color: #f4f4f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(224, 231, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(250, 232, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 241, 242, 0.8) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(243, 232, 255, 0.8) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .hidden-view { display: none !important; }
        
        /* Ultra-Premium Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.4); }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 8px 30px rgba(0,0,0,0.04), inset 0 1px 1px rgba(255, 255, 255, 0.8); }
        .glass-modal { background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        .scroll-smooth::-webkit-scrollbar { display: none; }
        .scroll-smooth { -ms-overflow-style: none; scrollbar-width: none; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-indigo-200">

    <nav class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-2">
            <span>✨</span> Stylectra
        </h1>
        <div id="nav-actions" class="hidden flex items-center gap-5">
            <span id="user-email" class="text-xs font-semibold text-gray-500 hidden md:inline-block tracking-wide"></span>
            <button id="logout-btn" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition bg-white/80 backdrop-blur-md border border-white px-5 py-2 rounded-full shadow-sm hover:shadow-md">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col md:flex-row overflow-hidden max-w-[1400px] mx-auto w-full relative">
        
        <section id="auth-view" class="w-full h-full flex items-center justify-center p-6">
            <div class="glass-card p-10 rounded-4xl shadow-floating w-full max-w-md">
                <div class="text-center mb-10">
                    <span class="text-5xl block mb-4">✨</span>
                    <h2 class="text-3xl font-extrabold tracking-tight mb-2 text-gray-900" id="auth-title">Sign In</h2>
                    <p class="text-sm text-gray-500 font-medium">Access your personal styling studio</p>
                </div>
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-white/70 backdrop-blur-sm rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm border border-white">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-white/70 backdrop-blur-sm rounded-2xl mb-8 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm border border-white">
                <button id="auth-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold tracking-wide p-4 rounded-2xl shadow-floating transition-transform hover:-translate-y-0.5">Continue</button>
                <div class="mt-8 flex justify-between text-sm font-semibold text-gray-500">
                    <button id="toggle-auth" onclick="toggleAuthMode()" class="hover:text-indigo-600 transition">Create Account</button>
                    <button id="forgot-password" onclick="resetPassword()" class="hover:text-indigo-600 transition">Forgot Password?</button>
                </div>
                <div id="auth-error" class="text-red-500 text-sm mt-4 text-center hidden bg-red-50/80 backdrop-blur-md p-3 rounded-xl border border-red-100 font-medium"></div>
            </div>
        </section>

        <section id="dashboard-view" class="w-full h-full hidden-view flex flex-col md:flex-row">
            
            <aside class="md:w-64 md:h-full flex-shrink-0 flex md:flex-col justify-around md:justify-start p-4 md:p-6 order-last md:order-first border-t md:border-r border-gray-200/40 z-30 relative glass md:bg-transparent md:border-t-0 md:border-b-0">
                <button onclick="loadSubView('wardrobe')" class="nav-btn w-full text-center md:text-left p-4 md:mb-3 rounded-3xl font-bold text-gray-400 hover:bg-white/80 hover:shadow-sm transition-all flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">👕</span> <span class="text-xs md:text-[15px] tracking-wide">Wardrobe</span>
                </button>
                <button onclick="loadSubView('styling')" class="nav-btn w-full text-center md:text-left p-4 md:mb-3 rounded-3xl font-bold text-gray-400 hover:bg-white/80 hover:shadow-sm transition-all flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">✨</span> <span class="text-xs md:text-[15px] tracking-wide">Styling</span>
                </button>
                <button onclick="loadSubView('memzone')" class="nav-btn w-full text-center md:text-left p-4 md:mb-3 rounded-3xl font-bold text-gray-400 hover:bg-white/80 hover:shadow-sm transition-all flex flex-col md:flex-row items-center gap-3">
                    <span class="text-2xl">📸</span> <span class="text-xs md:text-[15px] tracking-wide">MemZone</span>
                </button>
            </aside>

            <div class="flex-grow p-6 md:p-10 overflow-y-auto scroll-smooth" id="main-content">
                
                <div id="subview-wardrobe" class="hidden-view max-w-5xl mx-auto pb-24 md:pb-0">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-extrabold tracking-tight text-gray-900">Wardrobe</h2>
                        <button onclick="openNewWardrobeModal()" class="bg-gray-900 text-white px-6 py-3 rounded-full font-bold shadow-floating hover:scale-105 transition-transform flex items-center gap-2">
                            <span>+</span> New Collection
                        </button>
                    </div>
                    
                    <div id="new-wardrobe-form" class="hidden glass-card p-8 rounded-4xl shadow-floating mb-10 transition-all">
                        <h3 class="font-extrabold text-2xl mb-6 tracking-tight">Create Collection</h3>
                        <input type="text" id="w-name" placeholder="Name (e.g., Summer Essentials)" class="w-full p-4 bg-white/70 rounded-2xl mb-6 focus:ring-2 outline-none shadow-sm border border-white font-medium">
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                            <select id="w-gender" class="p-4 bg-white/70 rounded-2xl outline-none border border-white shadow-sm focus:ring-2 font-medium text-gray-700">
                                <option value="" disabled selected>Category</option><option>Women</option><option>Men</option>
                            </select>
                            <select id="w-skin" class="p-4 bg-white/70 rounded-2xl outline-none border border-white shadow-sm focus:ring-2 font-medium text-gray-700">
                                <option value="" disabled selected>Skin Tone</option><option>Fair (Very Light)</option><option>Light</option><option>Medium</option><option>Olive</option><option>Tan</option><option>Brown</option><option>Deep (Dark)</option>
                            </select>
                            <select id="w-body" class="p-4 bg-white/70 rounded-2xl outline-none border border-white shadow-sm focus:ring-2 font-medium text-gray-700">
                                <option value="" disabled selected>Body Shape</option><option>Hourglass</option><option>Pear (Triangle)</option><option>Apple (Round)</option><option>Rectangle (Straight)</option><option>Inverted Triangle</option>
                            </select>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="saveNewWardrobe()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-full font-bold shadow-md hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">Save Collection</button>
                            <button onclick="document.getElementById('new-wardrobe-form').classList.add('hidden')" class="bg-white/80 border border-gray-200 text-gray-700 px-8 py-3.5 rounded-full font-bold shadow-sm hover:bg-white transition-all">Cancel</button>
                        </div>
                    </div>

                    <div id="wardrobe-list" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
                </div>

                <div id="subview-styling" class="hidden-view max-w-3xl mx-auto pb-24 md:pb-0">
                    <h2 class="text-4xl font-extrabold tracking-tight mb-10 text-gray-900">Styling Studio</h2>
                    <div class="glass-card p-10 rounded-4xl shadow-floating mb-10">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Choose Collection</label>
                        <select id="style-wardrobe-select" class="w-full p-4 bg-white/80 border border-white rounded-2xl mb-8 outline-none focus:ring-2 shadow-sm font-medium text-gray-800"><option value="">Select Wardrobe...</option></select>
                        
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Occasion / Event</label>
                        <select id="style-occasion" class="w-full p-4 bg-white/80 border border-white rounded-2xl mb-10 outline-none focus:ring-2 shadow-sm font-medium text-gray-800">
                            <option>College</option><option>Office</option><option>Meeting</option><option>Family Out</option><option>Spiritual Event</option>
                            <option>Friends Out</option><option>Outing / Date</option><option>Shopping</option><option>Party</option><option>Trip / Vacation</option>
                            <option>Wedding</option><option>Reception</option><option>Functions</option><option>Gym</option><option>Sports</option>
                        </select>
                        
                        <button onclick="generateOutfit()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 text-white p-5 rounded-3xl font-extrabold text-lg shadow-floating transition-transform hover:-translate-y-1 flex justify-center items-center gap-2">
                            <span>✨</span> Generate Match
                        </button>
                    </div>

                    <div id="generated-outfit-area" class="hidden-view glass-card p-10 rounded-4xl shadow-floating border border-indigo-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                        <h3 class="text-3xl font-extrabold mb-10 text-center mt-2 tracking-tight text-gray-900">Your Outfit</h3>
                        <div id="outfit-images-display" class="flex flex-row justify-center gap-6 md:gap-12 mb-12"></div>
                        <div class="bg-white/50 p-6 rounded-3xl backdrop-blur-md border border-white shadow-sm">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Capture to MemZone</label>
                            <textarea id="memzone-note" placeholder="Add a memory note (e.g., 'Perfect for Friday night')..." class="w-full p-4 bg-white/80 border border-white rounded-2xl mb-5 outline-none focus:ring-2 shadow-sm resize-none h-24 font-medium"></textarea>
                            <button onclick="saveToMemZone()" class="w-full bg-gray-900 text-white px-4 py-4 rounded-2xl font-bold shadow-md hover:bg-black transition-transform hover:-translate-y-0.5">Save to Diary</button>
                        </div>
                    </div>
                </div>

                <div id="subview-memzone" class="hidden-view max-w-4xl mx-auto pb-24 md:pb-0">
                    <h2 class="text-4xl font-extrabold tracking-tight mb-10 text-gray-900">MemZone</h2>
                    <div id="memzone-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                </div>

            </div>
        </section>

        <div id="edit-modal" class="hidden glass-modal fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="glass-card p-8 rounded-4xl shadow-floating w-full max-w-md transition-all">
                <h3 class="font-extrabold text-2xl mb-6 tracking-tight">Edit Collection</h3>
                <input type="hidden" id="edit-w-id">
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Wardrobe Name</label>
                <input type="text" id="edit-w-name" class="w-full p-4 bg-white/80 rounded-2xl mb-4 focus:ring-2 outline-none shadow-sm border border-white font-medium">
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Category (Locked)</label>
                <select id="edit-w-gender" class="w-full p-4 bg-gray-100/50 text-gray-400 rounded-2xl mb-4 outline-none border border-transparent cursor-not-allowed font-medium">
                    <option>Women</option><option>Men</option>
                </select>
                
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Skin Tone</label>
                <select id="edit-w-skin" class="w-full p-4 bg-white/80 rounded-2xl mb-4 outline-none focus:ring-2 shadow-sm border border-white font-medium">
                    <option>Fair (Very Light)</option><option>Light</option><option>Medium</option><option>Olive</option><option>Tan</option><option>Brown</option><option>Deep (Dark)</option>
                </select>

                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Body Shape</label>
                <select id="edit-w-body" class="w-full p-4 bg-white/80 rounded-2xl mb-8 outline-none focus:ring-2 shadow-sm border border-white font-medium">
                    <option>Hourglass</option><option>Pear (Triangle)</option><option>Apple (Round)</option><option>Rectangle (Straight)</option><option>Inverted Triangle</option>
                </select>

                <div class="flex gap-3">
                    <button onclick="updateWardrobe()" class="flex-grow bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-md hover:bg-indigo-700 transition">Update</button>
                    <button onclick="closeEditModal()" class="flex-grow bg-white border border-gray-200 text-gray-800 py-4 rounded-2xl font-bold hover:bg-gray-50 transition">Cancel</button>
                </div>
            </div>
        </div>

        <div id="memzone-modal" class="hidden glass-modal fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="glass-card p-8 rounded-4xl shadow-floating w-full max-w-md transition-all text-center">
                <span class="text-4xl mb-4 block">📸</span>
                <h3 class="font-extrabold text-2xl mb-2 tracking-tight">Outfit Details</h3>
                <div id="memzone-info-content" class="text-sm text-gray-700 mb-6 space-y-3 bg-white/60 p-5 rounded-3xl text-left border border-white shadow-sm font-medium"></div>
                
                <label class="block text-left text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Update Memory Note</label>
                <input type="hidden" id="edit-mem-id">
                <textarea id="edit-mem-note" class="w-full p-4 bg-white/80 rounded-3xl mb-6 outline-none focus:ring-2 shadow-sm border border-white resize-none h-24 font-medium"></textarea>
                
                <div class="flex gap-3">
                    <button onclick="updateMemZoneNote()" class="flex-grow bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-md hover:bg-black transition">Save Note</button>
                    <button onclick="document.getElementById('memzone-modal').classList.add('hidden')" class="flex-grow bg-white border border-gray-200 text-gray-800 py-4 rounded-2xl font-bold hover:bg-gray-50 transition">Close</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, addDoc, updateDoc, arrayUnion, arrayRemove, query, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCcOr6SrXpznpXhyGB2Og4rFPqJIS7M0cA",
            authDomain: "stylectra-71660.firebaseapp.com",
            projectId: "stylectra-71660",
            storageBucket: "stylectra-71660.firebasestorage.app",
            messagingSenderId: "955558027492",
            appId: "1:955558027492:web:4c6d178b35710939184cf1",
            measurementId: "G-PYWZ5TXJ2H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let isLoginMode = true;
        let currentGeneratedImages = { topId: null, bottomId: null, wName: '', wSkin: '', wBody: '', topCat: '', botCat: '' };

        const womenCategories = ['Top', 'Bottom', 'Dress', 'Kurti', 'Saree', 'Casuals', 'Ethnic Wear', 'Sports Wear', 'Footwear'];
        const menCategories = ['Shirt', 'T-Shirt', 'Pant', 'Ethnic Wear', 'Casuals', 'Sports Wear', 'Footwear'];

        // --- UI Routing ---
        window.switchView = (viewId) => {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById(`${viewId}-view`).classList.remove('hidden-view');
            if(viewId === 'dashboard') {
                document.getElementById('nav-actions').classList.remove('hidden');
                document.getElementById('user-email').innerText = currentUser.email;
                loadSubView('wardrobe');
            } else {
                document.getElementById('nav-actions').classList.add('hidden');
            }
        };

        window.loadSubView = (subId) => {
            document.getElementById('subview-wardrobe').classList.add('hidden-view');
            document.getElementById('subview-styling').classList.add('hidden-view');
            document.getElementById('subview-memzone').classList.add('hidden-view');
            document.getElementById(`subview-${subId}`).classList.remove('hidden-view');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/80', 'shadow-sm', 'text-gray-900', 'border', 'border-white');
                btn.classList.add('text-gray-400');
            });
            event?.currentTarget?.classList.add('bg-white/80', 'shadow-sm', 'text-gray-900', 'border', 'border-white');
            event?.currentTarget?.classList.remove('text-gray-400');

            if(subId === 'wardrobe') fetchWardrobes();
            if(subId === 'memzone') fetchMemZone();
        };

        // --- Auth ---
        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; switchView('dashboard'); } 
            else { currentUser = null; switchView('auth'); }
        });

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Sign In" : "Create Account";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Continue" : "Sign Up";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Create Account" : "Back to Sign In";
        };

        document.getElementById('auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            errorDiv.classList.add('hidden');
            const btn = document.getElementById('auth-btn');
            btn.innerText = "Authenticating...";
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorDiv.innerText = error.message.replace("Firebase: ", "");
                errorDiv.classList.remove('hidden');
                btn.innerText = isLoginMode ? "Continue" : "Sign Up";
            }
        });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- Wardrobe Core ---
        window.openNewWardrobeModal = () => document.getElementById('new-wardrobe-form').classList.toggle('hidden');

        window.saveNewWardrobe = async () => {
            const name = document.getElementById('w-name').value;
            const gender = document.getElementById('w-gender').value;
            const skinTone = document.getElementById('w-skin').value;
            const bodyShape = document.getElementById('w-body').value;
            
            if(!name || !gender || !skinTone || !bodyShape) return alert("Please fill all fields.");

            const q = query(collection(db, `users/${currentUser.uid}/wardrobes`));
            const snapshot = await getDocs(q);
            const isDuplicate = snapshot.docs.some(d => d.data().name.toLowerCase() === name.toLowerCase());
            
            if (isDuplicate) return alert(`A wardrobe named "${name}" already exists.`);

            try {
                await addDoc(collection(db, `users/${currentUser.uid}/wardrobes`), { name, gender, skinTone, bodyShape, items: [] });
                document.getElementById('new-wardrobe-form').classList.add('hidden');
                document.getElementById('w-name').value = '';
                fetchWardrobes();
            } catch (e) { alert("Error saving wardrobe."); }
        };

        window.fetchWardrobes = async () => {
            const list = document.getElementById('wardrobe-list');
            const select = document.getElementById('style-wardrobe-select');
            list.innerHTML = '<p class="text-gray-500 font-medium col-span-2 text-center py-10">Syncing collection...</p>'; 
            select.innerHTML = '<option value="">Select Wardrobe...</option>';

            const q = query(collection(db, `users/${currentUser.uid}/wardrobes`));
            const snapshot = await getDocs(q);
            list.innerHTML = '';
            
            if(snapshot.empty) list.innerHTML = '<p class="text-gray-500 font-medium col-span-2 text-center py-10 glass-card rounded-3xl">No collections created yet.</p>';

            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const items = data.items || [];
                const catOptions = data.gender === 'Men' ? menCategories : womenCategories;
                
                let galleryHTML = '';
                if(items.length > 0) {
                    for (const item of items) {
                        const imgData = await localforage.getItem(item.imageId);
                        if(imgData) {
                            galleryHTML += `
                                <div class="flex flex-col items-center group relative">
                                    <div class="relative w-24 h-32 rounded-3xl border border-white/60 overflow-hidden shadow-sm transition-all hover:-translate-y-1 cursor-pointer">
                                        <img src="${imgData}" class="w-full h-full object-cover">
                                        
                                        <button onclick="deleteItem('${docSnap.id}', '${item.imageId}', '${item.category}')" class="absolute top-2 right-2 w-7 h-7 bg-white/80 backdrop-blur-md rounded-full shadow-sm flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-red-50 hover:scale-110 z-20 border border-white/50" title="Delete Item">
                                            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                    <span class="text-[10px] font-bold text-gray-500 mt-2.5 uppercase tracking-widest">${item.category}</span>
                                </div>
                            `;
                        }
                    }
                } else { galleryHTML = `<p class="text-sm text-gray-400 font-medium italic w-full py-6 text-center">Your collection is empty.</p>`; }

                let catSelectHTML = `<option value="" disabled selected>Select Category...</option>`;
                catOptions.forEach(opt => catSelectHTML += `<option>${opt}</option>`);

                list.innerHTML += `
                    <div class="glass-card p-8 rounded-4xl flex flex-col justify-between relative group">
                        <div class="absolute top-6 right-6 flex gap-2">
                            <button onclick="openEditModal('${docSnap.id}', '${data.name}', '${data.gender}', '${data.skinTone}', '${data.bodyShape}')" class="w-9 h-9 flex items-center justify-center bg-white/80 backdrop-blur-sm border border-white text-gray-600 rounded-full hover:bg-gray-50 shadow-sm transition-transform hover:scale-105" title="Edit">✏️</button>
                            <button onclick="deleteWardrobe('${docSnap.id}')" class="w-9 h-9 flex items-center justify-center bg-red-50/80 backdrop-blur-sm border border-red-100 text-red-500 rounded-full hover:bg-red-100 shadow-sm transition-transform hover:scale-105" title="Delete">🗑️</button>
                        </div>

                        <div>
                            <div class="flex flex-col items-start mb-6">
                                <span class="bg-indigo-50/80 text-indigo-700 text-[11px] px-3 py-1 rounded-full font-bold border border-indigo-100 mb-3 tracking-wide uppercase">${data.gender}</span>
                                <h3 class="font-extrabold text-2xl tracking-tight text-gray-900">${data.name}</h3>
                                <p class="text-sm text-gray-500 mt-1 font-medium">${data.skinTone} • ${data.bodyShape}</p>
                            </div>
                            
                            <div class="mb-6 p-5 bg-white/40 rounded-3xl border border-white shadow-inner">
                                <div class="flex overflow-x-auto gap-5 pb-2 scroll-smooth">${galleryHTML}</div>
                            </div>
                        </div>
                        
                        <div class="pt-6 border-t border-gray-200/50">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-16 h-16 bg-white/80 rounded-2xl overflow-hidden flex items-center justify-center relative shrink-0 border border-white shadow-sm">
                                    <span class="text-3xl text-gray-300 absolute z-0 font-light">+</span>
                                    <img id="preview-${docSnap.id}" class="w-full h-full object-cover hidden relative z-10" />
                                </div>
                                <input type="file" accept="image/*" id="file-${docSnap.id}" onchange="previewImage(this, '${docSnap.id}')" class="text-sm font-medium w-full file:mr-3 file:py-2.5 file:px-5 file:rounded-full file:border-0 file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-colors">
                            </div>

                            <div class="flex gap-3">
                                <select id="cat-${docSnap.id}" class="flex-grow p-3.5 bg-white/80 border border-white rounded-2xl outline-none focus:ring-2 text-sm shadow-sm font-medium text-gray-700">${catSelectHTML}</select>
                                <button onclick="uploadLocalItem('${docSnap.id}')" id="btn-${docSnap.id}" class="bg-gray-900 text-white px-6 rounded-2xl text-sm font-bold shadow-md hover:-translate-y-0.5 transition-transform tracking-wide">Save</button>
                            </div>
                        </div>
                    </div>
                `;
                select.innerHTML += `<option value="${docSnap.id}">${data.name}</option>`;
            }
        };

        // --- Editing & Deleting ---
        window.openEditModal = (id, name, gender, skin, body) => {
            document.getElementById('edit-w-id').value = id;
            document.getElementById('edit-w-name').value = name;
            document.getElementById('edit-w-gender').value = gender;
            document.getElementById('edit-w-gender').disabled = true;
            document.getElementById('edit-w-skin').value = skin;
            document.getElementById('edit-w-body').value = body;
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = () => document.getElementById('edit-modal').classList.add('hidden');

        window.updateWardrobe = async () => {
            const id = document.getElementById('edit-w-id').value;
            const ref = doc(db, `users/${currentUser.uid}/wardrobes`, id);
            await updateDoc(ref, {
                name: document.getElementById('edit-w-name').value,
                skinTone: document.getElementById('edit-w-skin').value,
                bodyShape: document.getElementById('edit-w-body').value
            });
            closeEditModal();
            fetchWardrobes();
        };

        window.deleteWardrobe = async (id) => {
            if(!confirm("Are you sure you want to delete this entire collection?")) return;
            await deleteDoc(doc(db, `users/${currentUser.uid}/wardrobes`, id));
            fetchWardrobes();
        };

        window.deleteItem = async (wardrobeId, imageId, category) => {
            if(!confirm("Remove this item from the collection?")) return;
            const ref = doc(db, `users/${currentUser.uid}/wardrobes`, wardrobeId);
            await updateDoc(ref, { items: arrayRemove({ imageId: imageId, category: category }) });
            await localforage.removeItem(imageId);
            fetchWardrobes();
        };

        // --- Uploading ---
        window.previewImage = (input, id) => {
            const preview = document.getElementById(`preview-${id}`);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); }
                reader.readAsDataURL(input.files[0]);
            } else { preview.classList.add('hidden'); preview.src = ''; }
        };

        window.uploadLocalItem = async (wardrobeId) => {
            const fileInput = document.getElementById(`file-${wardrobeId}`);
            const category = document.getElementById(`cat-${wardrobeId}`).value;
            const btn = document.getElementById(`btn-${wardrobeId}`);
            if(!fileInput.files.length) return alert("Select an image.");
            if(!category) return alert("Select a category.");

            btn.innerText = "Saving...";
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result;
                const imageId = `img_${Date.now()}`;
                
                await localforage.setItem(imageId, base64Data);
                const ref = doc(db, `users/${currentUser.uid}/wardrobes`, wardrobeId);
                await updateDoc(ref, { items: arrayUnion({ imageId: imageId, category: category }) });

                btn.innerText = "Save";
                fileInput.value = "";
                document.getElementById(`preview-${wardrobeId}`).classList.add('hidden');
                document.getElementById(`cat-${wardrobeId}`).selectedIndex = 0;
                fetchWardrobes();
            };
            reader.readAsDataURL(fileInput.files[0]);
        };

        // --- SMART GENERATION ---
        window.generateOutfit = async () => {
            const wid = document.getElementById('style-wardrobe-select').value;
            const occasion = document.getElementById('style-occasion').value;
            if(!wid) return alert("Please select a wardrobe.");
            
            const btn = event.target;
            btn.innerHTML = "✨ Matching...";

            try {
                const docSnap = await getDoc(doc(db, `users/${currentUser.uid}/wardrobes`, wid));
                const wData = docSnap.data();
                const items = wData.items || [];

                let allowedTops = ['Top', 'Shirt', 'Kurti'];
                let allowedBottoms = ['Bottom', 'Pant', 'Casuals'];

                if (['Office', 'Meeting'].includes(occasion)) {
                    allowedTops = ['Shirt', 'Top']; allowedBottoms = ['Pant', 'Bottom'];
                } else if (['College'].includes(occasion)) {
                    allowedTops = ['Shirt', 'Top', 'Kurti']; allowedBottoms = ['Pant', 'Bottom', 'Casuals'];
                } else if (['Gym', 'Sports'].includes(occasion)) {
                    allowedTops = ['Sports Wear', 'T-Shirt']; allowedBottoms = ['Sports Wear', 'Pant'];
                } else if (['Wedding', 'Reception', 'Spiritual Event'].includes(occasion)) {
                    allowedTops = ['Shirt', 'Kurti', 'Ethnic Wear']; allowedBottoms = ['Pant'];
                } else {
                    allowedTops.push('T-Shirt'); 
                }

                const validTops = items.filter(i => allowedTops.includes(i.category));
                const validBottoms = items.filter(i => allowedBottoms.includes(i.category));

                if (validTops.length === 0 || validBottoms.length === 0) {
                    btn.innerHTML = "✨ Generate Match";
                    return alert(`No suitable clothes found for "${occasion}". Add matching items (e.g., ${allowedTops.join(', ')} & ${allowedBottoms.join(', ')}).`);
                }

                const selTop = validTops[Math.floor(Math.random() * validTops.length)];
                const selBot = validBottoms[Math.floor(Math.random() * validBottoms.length)];

                const topImg = await localforage.getItem(selTop.imageId);
                const botImg = await localforage.getItem(selBot.imageId);

                currentGeneratedImages = { 
                    topId: selTop.imageId, bottomId: selBot.imageId, 
                    topCat: selTop.category, botCat: selBot.category,
                    wName: wData.name, wSkin: wData.skinTone, wBody: wData.bodyShape 
                };

                document.getElementById('generated-outfit-area').classList.remove('hidden-view');
                document.getElementById('outfit-images-display').innerHTML = `
                    <div class="flex flex-col items-center group">
                        <span class="text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-widest">${selTop.category}</span>
                        <div class="h-64 w-48 md:h-80 md:w-56 bg-white rounded-3xl shadow-floating border border-white overflow-hidden group-hover:-translate-y-1 transition-transform"><img src="${topImg}" class="w-full h-full object-cover" /></div>
                    </div>
                    <div class="flex flex-col items-center group">
                        <span class="text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-widest">${selBot.category}</span>
                        <div class="h-64 w-48 md:h-80 md:w-56 bg-white rounded-3xl shadow-floating border border-white overflow-hidden group-hover:-translate-y-1 transition-transform"><img src="${botImg}" class="w-full h-full object-cover" /></div>
                    </div>
                `;
                btn.innerHTML = "✨ Generate Match";
            } catch (e) { alert("Generation error."); btn.innerHTML = "✨ Generate Match"; }
        };

        // --- MemZone ---
        window.saveToMemZone = async () => {
            const note = document.getElementById('memzone-note').value;
            const occasion = document.getElementById('style-occasion').value;
            if(!currentGeneratedImages.topId) return;
            const btn = event.target;
            btn.innerText = "Saving...";
            
            try {
                await addDoc(collection(db, `users/${currentUser.uid}/memzone`), { 
                    note, occasion, date: new Date().toISOString(), ...currentGeneratedImages 
                });
                alert("Saved to MemZone Diary!");
                document.getElementById('memzone-note').value = '';
                document.getElementById('generated-outfit-area').classList.add('hidden-view');
                btn.innerText = "Save to Diary";
            } catch(e) { btn.innerText = "Save to Diary"; }
        };

        window.fetchMemZone = async () => {
            const list = document.getElementById('memzone-list');
            list.innerHTML = '<p class="text-gray-500 font-medium">Loading diary...</p>';
            const snapshot = await getDocs(query(collection(db, `users/${currentUser.uid}/memzone`)));
            list.innerHTML = '';
            
            if (snapshot.empty) { list.innerHTML = '<p class="text-gray-500 text-center py-12 col-span-2 glass-card rounded-4xl font-medium">Your fashion diary is empty.</p>'; return; }
            
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const topImg = data.topId ? await localforage.getItem(data.topId) : '';
                const bottomImg = data.bottomId ? await localforage.getItem(data.bottomId) : '';
                const dataStr = encodeURIComponent(JSON.stringify({...data, id: docSnap.id}));

                list.innerHTML += `
                    <div class="glass-card rounded-4xl pt-4 px-8 pb-8 relative group overflow-hidden">
                        
                        <div class="flex justify-center mb-4">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-7 text-gray-300">
                                <path d="M12 4v4M12 4a2 2 0 1 1 2 2h-2M4 16l8-8 8 8"></path>
                                <path d="M4 16h16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2z"></path>
                            </svg>
                        </div>

                        <div class="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openMemZoneInfo('${dataStr}')" class="w-9 h-9 bg-white/80 backdrop-blur-sm border border-white text-indigo-600 rounded-full flex items-center justify-center hover:bg-white shadow-sm hover:scale-105 transition-transform" title="Info/Edit">ℹ️</button>
                            <button onclick="deleteMemZone('${docSnap.id}')" class="w-9 h-9 bg-red-50/80 backdrop-blur-sm border border-red-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-100 shadow-sm hover:scale-105 transition-transform" title="Delete">🗑️</button>
                        </div>

                        <div class="text-center mb-6">
                            <h4 class="font-extrabold text-2xl text-gray-900 tracking-tight">${data.occasion}</h4>
                            <span class="text-xs text-gray-500 font-bold uppercase tracking-widest">${new Date(data.date).toLocaleDateString()}</span>
                        </div>
                        
                        <div class="flex justify-center gap-5 mb-6">
                            <div class="flex flex-col items-center">
                                <img src="${topImg}" class="w-28 h-40 object-cover rounded-3xl shadow-sm border border-white" />
                                <span class="text-[10px] text-gray-400 font-bold mt-2.5 uppercase tracking-widest">${data.topCat || 'Top'}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <img src="${bottomImg}" class="w-28 h-40 object-cover rounded-3xl shadow-sm border border-white" />
                                <span class="text-[10px] text-gray-400 font-bold mt-2.5 uppercase tracking-widest">${data.botCat || 'Bottom'}</span>
                            </div>
                        </div>
                        
                        ${data.note ? `<div class="bg-white/60 p-4 rounded-2xl border border-white text-center shadow-inner"><p class="text-gray-800 text-sm font-medium">"${data.note}"</p></div>` : ''}
                    </div>
                `;
            }
        };

        window.openMemZoneInfo = (dataStr) => {
            const data = JSON.parse(decodeURIComponent(dataStr));
            document.getElementById('edit-mem-id').value = data.id;
            document.getElementById('edit-mem-note').value = data.note || '';
            
            document.getElementById('memzone-info-content').innerHTML = `
                <div class="flex justify-between items-center border-b border-gray-200/50 pb-2 mb-2">
                    <span class="text-gray-500 font-bold text-xs uppercase tracking-wider">Wardrobe</span>
                    <span class="font-bold text-gray-900">${data.wName || 'Unknown'}</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-200/50 pb-2 mb-2">
                    <span class="text-gray-500 font-bold text-xs uppercase tracking-wider">Skin Tone</span>
                    <span class="font-bold text-gray-900">${data.wSkin || 'N/A'}</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500 font-bold text-xs uppercase tracking-wider">Body Shape</span>
                    <span class="font-bold text-gray-900">${data.wBody || 'N/A'}</span>
                </div>
            `;
            document.getElementById('memzone-modal').classList.remove('hidden');
        };

        window.updateMemZoneNote = async () => {
            const id = document.getElementById('edit-mem-id').value;
            const note = document.getElementById('edit-mem-note').value;
            await updateDoc(doc(db, `users/${currentUser.uid}/memzone`, id), { note });
            document.getElementById('memzone-modal').classList.add('hidden');
            fetchMemZone();
        };

        window.deleteMemZone = async (id) => {
            if(!confirm("Delete this memory from your diary?")) return;
            await deleteDoc(doc(db, `users/${currentUser.uid}/memzone`, id));
            fetchMemZone();
        };
    </script>
</body>
</html>
